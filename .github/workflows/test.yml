name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is run by the separate `windows-test` job below
        # (continue-on-error) rather than in this matrix, until vendored
        # shell scripts have .ps1 siblings and POSIX-shaped tests are
        # abstracted. Tracked in the project_windows_support_followup note.
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so setuptools-scm derives a real version,
          # matching the windows-test job. Without this the POSIX matrix
          # falls back to 0.0.1 and --version diverges from Windows CI.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: mypy src/mintd
      - name: Test
        run: pytest -q
      - name: Smoke install
        # Verifies the INSTALLED mintd binary launches on every matrix
        # entry. Test suite covers logic; smoke covers the binary +
        # subcommand-import surface. Enclave init is used because slice
        # 30 makes data/code/project types prompt interactively — CI
        # is non-TTY and would error with InitNonInteractive. Enclave
        # skips the prompt entirely.
        run: |
          mintd --version
          mintd --help
          mintd init --help
          mintd check --help
          mintd publish --help
          mintd data --help
          mintd init enclave ci-smoke --path "${{ runner.temp }}"
  windows-test:
    # REQUIRED since the canary first went fully green (fsync fix #5 +
    # test-portability #7): a red windows-test now means a real regression.
    # Vendored *.sh templates still lack *.ps1 siblings (Windows-GA work,
    # tracked in the project_windows_support_followup note) — the affected
    # tests skip on nt with reasons rather than fail. Installs into a real
    # .venv to mirror local dev.
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so a future git-derived version
          # (e.g. setuptools-scm) resolves on the runner.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv and install
        # $PSNativeCommandUseErrorActionPreference makes pwsh fail the step on
        # ANY native command's non-zero exit, not just the last one — without
        # it a mid-step failure is swallowed and the step reports green.
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          python -m venv .venv
          .venv\Scripts\python.exe -m pip install --upgrade pip
          .venv\Scripts\python.exe -m pip install -e ".[dev]"
      - name: Configure git identity
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Lint
        run: .venv\Scripts\ruff.exe check src tests
      - name: Type-check
        run: .venv\Scripts\mypy.exe src/mintd
      - name: Test
        run: .venv\Scripts\pytest.exe -q
      - name: Smoke install
        # Mirrors the POSIX smoke step: confirms the installed mintd
        # console-script launches on Windows. Enclave init is used because
        # data/code/project types prompt interactively and CI is non-TTY.
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          .venv\Scripts\mintd.exe --version
          .venv\Scripts\mintd.exe --help
          .venv\Scripts\mintd.exe init --help
          .venv\Scripts\mintd.exe check --help
          .venv\Scripts\mintd.exe publish --help
          .venv\Scripts\mintd.exe data --help
          .venv\Scripts\mintd.exe init enclave ci-smoke --path "${{ runner.temp }}"
