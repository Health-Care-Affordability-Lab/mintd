name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest disabled until vendored shell scripts have .ps1
        # siblings and POSIX-shaped tests are abstracted. Tracked in the
        # project_windows_support_followup memory note.
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Configure git identity
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: mypy src/mintd
      - name: Test
        run: pytest -q
      - name: Smoke install
        # Verifies the INSTALLED mintd binary launches on every matrix
        # entry. Test suite covers logic; smoke covers the binary +
        # subcommand-import surface. Enclave init is used because slice
        # 30 makes data/code/project types prompt interactively — CI
        # is non-TTY and would error with InitNonInteractive. Enclave
        # skips the prompt entirely.
        run: |
          mintd --version
          mintd --help
          mintd init --help
          mintd check --help
          mintd publish --help
          mintd data --help
          mintd init enclave ci-smoke --path "${{ runner.temp }}"
